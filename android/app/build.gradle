plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

import java.util.Properties

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) flutterVersionCode = "1"

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) flutterVersionName = "1.0"

android {
    namespace "com.smartspeak.app"
    compileSdk 36
    ndkVersion "28.2.13676358"

    defaultConfig {
        applicationId "com.smartspeak.app"
        minSdk 24
        targetSdk 36

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    

    buildTypes {
        release {
            // For now, use debug signing so `flutter run --release` works without keystore setup
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // keep empty unless you explicitly add dependencies
}
