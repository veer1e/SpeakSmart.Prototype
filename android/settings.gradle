pluginManagement {
    // Read flutter.sdk from local.properties
    def localProperties = new java.util.Properties()
    def localPropertiesFile = new File(rootDir, "local.properties")
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withInputStream { stream -> localProperties.load(stream) }
    }

    def flutterSdkPath = localProperties.getProperty("flutter.sdk")
    if (flutterSdkPath == null) {
        throw new GradleException("flutter.sdk not set in android/local.properties")
    }

    // REQUIRED so Gradle can find Flutter's Gradle plugins
    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.1" apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}



dependencyResolutionManagement {
    // Flutter's Gradle plugins may add a repository internally; FAIL_ON_PROJECT_REPOS breaks builds.
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url "https://storage.googleapis.com/download.flutter.io" }
    }
}



include ":app"
